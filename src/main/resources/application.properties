spring.application.name=TireVault
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/TireVault
spring.datasource.username=postgres
spring.datasource.password=1111
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

spring.session.servlet.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=7d

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

springdoc.packagesToScan=course.project.ua.tirevault
springdoc.pathsToMatch=/**
spring.mvc.pathmatch.use-suffix-pattern=false
springdoc.show-mvc-controllers=true