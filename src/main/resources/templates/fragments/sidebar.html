<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<th:block th:fragment="menu">
    <div class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark sticky-top vh-100 w-25 overflow-auto">
        <a href="#" class="d-flex align-items-center justify-content-center mb-3 text-white text-decoration-none">
            <span class="fs-2 fw-bold">TireVault</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="/" class="nav-link text-white">
                    <i class="bi bi-house me-2"></i>Головна
                </a>
            </li>
            <li>
                <a href="/services" class="nav-link text-white">
                    <i class="bi bi-wrench-adjustable me-2"></i>Послуги
                </a>
            </li>
            <li>
                <a href="/products" class="nav-link text-white">
                    <i class="bi bi-grid me-2"></i>Автотовари
                </a>
            </li>
            <li>
                <a th:href="${session.loggedUser != null ? '/myservices' : '/auth'}"
                   class="nav-link text-white d-flex align-items-center justify-content-between">
                    <span><i class="bi bi-bag-check me-2"></i>Мої записи</span>
                    <span th:if="${session.loggedUser != null and unseenOrdersCount != null and unseenOrdersCount > 0}"
                          class="badge rounded-pill bg-warning text-dark"
                          th:text="${unseenOrdersCount}">0</span>
                </a>
            </li>
            <li th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'MANAGER'}">
                <a href="/manager/services"
                   class="nav-link text-white fw-bold d-flex align-items-center justify-content-between">
                    <span><i class="bi bi-journal-text me-2"></i>Журнал записів</span>
                    <span th:if="${pendingOrdersCount != null and pendingOrdersCount > 0}"
                          class="badge rounded-pill bg-danger"
                          th:text="${pendingOrdersCount}">0</span>
                </a>
            </li>
            <li>
                <a th:href="${session.loggedUser != null ? '/myorders' : '/auth'}"
                   class="nav-link text-white d-flex align-items-center justify-content-between">
                    <span><i class="bi bi-cart-check me-2"></i>Мої замовлення</span>
                    <span th:if="${session.loggedUser != null and unseenProductOrdersCount != null and unseenProductOrdersCount > 0}"
                          class="badge rounded-pill bg-warning text-dark"
                          th:text="${unseenProductOrdersCount}">0</span>
                </a>
            </li>
            <li th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'MANAGER'}">
                <a href="/manager/orders"
                   class="nav-link text-white fw-bold d-flex align-items-center justify-content-between">
                    <span><i class="bi bi-bag me-2"></i>Журнал замовлень</span>
                    <span th:if="${pendingProductOrdersCount != null and pendingProductOrdersCount > 0}"
                          class="badge rounded-pill bg-danger"
                          th:text="${pendingProductOrdersCount}">0</span>
                </a>
            </li>
            <li>
                <a th:href="${session.loggedUser != null ? '/myreviews' : '/auth'}"
                   class="nav-link text-white d-flex align-items-center justify-content-between">
                    <span><i class="bi bi-chat-square-text me-2"></i>Мої відгуки</span>
                    <span th:if="${session.loggedUser != null
                       and reviewNotificationCount != null
                       and reviewNotificationCount > 0}"
                          class="badge rounded-pill bg-warning text-dark"
                          th:text="${reviewNotificationCount}">0</span>
                </a>
            </li>
            <li th:if="${session.loggedUser != null
             and (session.loggedUser.role.name() == 'MANAGER'
                  or session.loggedUser.role.name() == 'ADMIN')}">
                <a th:href="${session.loggedUser.role.name() == 'ADMIN'
                  ? '/admin/reviews' : '/manager/reviews'}"
                   class="nav-link text-white fw-bold">
                    <i class="bi bi-chat-dots me-2"></i>Журнал відгуків
                </a>
            </li>
            <li th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'ADMIN'}">
                <a href="/admin" class="nav-link text-white fw-bold">
                    <i class="bi bi-shield-lock me-2"></i>Адміністратор
                </a>
            </li>
        </ul>
        <hr>
        <div th:if="${session.loggedUser == null}">
            <a href="/auth" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center fw-bold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Увійти
            </a>
        </div>
        <div th:if="${session.loggedUser != null}" class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle w-100"
               data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle fs-4 me-2"></i>
                <strong th:text="${session.loggedUser.username}"></strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow w-100">
                <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>Акаунт</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li>
                    <a class="dropdown-item text-danger" href="#" data-bs-toggle="modal" data-bs-target="#logoutModal">
                        <i class="bi bi-box-arrow-right me-2"></i>Вийти
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <div th:if="${session.loggedUser != null}" class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 shadow text-dark">
                <div class="modal-header border-bottom-0">
                    <h1 class="modal-title fs-5 fw-bold text-danger" id="logoutModalLabel">Підтвердження виходу</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-0">
                    <p class="mb-3">Ви дійсно бажаєте вийти з облікового запису?</p>
                </div>
                <div class="modal-footer flex-column align-items-stretch w-100 gap-2 pb-3 border-top-0">
                    <a href="/logout" class="btn btn-lg btn-danger fw-bold">Вийти</a>
                    <button type="button" class="btn btn-lg btn-secondary fw-bold" data-bs-dismiss="modal">
                        Скасувати
                    </button>
                </div>
            </div>
        </div>
    </div>
</th:block>

</body>
</html>
