<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark" th:fragment="menu">
    <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
        <svg class="bi pe-none me-2" width="40" height="32" aria-hidden="true">
            <use xlink:href="#bootstrap"></use>
        </svg>
        <span class="fs-4">TireVault</span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a href="/" class="nav-link" aria-current="page">
                <svg class="bi pe-none me-2" width="16" height="16" aria-hidden="true">
                    <use xlink:href="#home"></use>
                </svg>
                Головна
            </a>
        </li>
        <li>
            <a href="/services" class="nav-link text-white">
                <svg class="bi pe-none me-2" width="16" height="16" aria-hidden="true">
                    <use xlink:href="#speedometer2"></use>
                </svg>
                Послуги
            </a>
        </li>
        <li>
            <a href="/products" class="nav-link text-white">
                <svg class="bi pe-none me-2" width="16" height="16" aria-hidden="true">
                    <use xlink:href="#grid"></use>
                </svg>
                Автотовари
            </a>
        </li>
        <li>
            <a th:href="${session.loggedUser != null ? '/myservices' : '/auth'}"
               class="nav-link text-white d-flex align-items-center justify-content-between">
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                         class="bi bi-bag-check me-2" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M10.854 8.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 0 1 .708-.708L7.5 10.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                        <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1zm3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4h-3.5zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5z"/>
                    </svg>
                    Мої записи
                </span>
                <span th:if="${session.loggedUser != null and unseenOrdersCount != null and unseenOrdersCount > 0}"
                      class="badge rounded-pill bg-warning text-dark"
                      th:text="${unseenOrdersCount}">0</span>
            </a>
        </li>
        <li th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'MANAGER'}">
            <a href="/manager/services" class="nav-link text-warning fw-bold d-flex align-items-center justify-content-between">
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                         class="bi bi-journal-text me-2" viewBox="0 0 16 16">
                        <path d="M5 10.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
                        <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2z"/>
                        <path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1H1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1H1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1H1z"/>
                    </svg>
                    Журнал записів
                </span>
                <span th:if="${pendingOrdersCount != null and pendingOrdersCount > 0}"
                      class="badge rounded-pill bg-danger"
                      th:text="${pendingOrdersCount}">0</span>
            </a>
        </li>
        <li>
            <a th:href="${session.loggedUser != null ? '/myorders' : '/auth'}"
               class="nav-link text-white d-flex align-items-center justify-content-between">
        <span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-cart-check me-2" viewBox="0 0 16 16">
                <path d="M11.354 6.354a.5.5 0 0 0-.708-.708L8 8.293 6.854 7.146a.5.5 0 1 0-.708.708l1.5 1.5a.5.5 0 0 0 .708 0l3-3z"/>
                <path d="M.5 1a.5.5 0 0 0 0 1h1.11l.401 1.607 1.498 7.985A.5.5 0 0 0 4 12h1a2 2 0 1 0 0 4 2 2 0 0 0 0-4h7a2 2 0 1 0 0 4 2 2 0 0 0 0-4h1a.5.5 0 0 0 .491-.408l1.5-8A.5.5 0 0 0 14.5 3H2.89l-.405-1.621A.5.5 0 0 0 2 1H.5z"/>
            </svg>
            Мої замовлення
        </span>
                <span th:if="${session.loggedUser != null and unseenProductOrdersCount != null and unseenProductOrdersCount > 0}"
                      class="badge rounded-pill bg-warning text-dark"
                      th:text="${unseenProductOrdersCount}">0</span>
            </a>
        </li>

        <li th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'MANAGER'}">
            <a href="/manager/orders" class="nav-link text-warning fw-bold d-flex align-items-center justify-content-between">
        <span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-bag me-2" viewBox="0 0 16 16">
                <path d="M8 1a2.5 2.5 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1zm3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4h-3.5zM2 5h12v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V5z"/>
            </svg>
            Журнал замовлень
        </span>
                <span th:if="${pendingProductOrdersCount != null and pendingProductOrdersCount > 0}"
                      class="badge rounded-pill bg-danger"
                      th:text="${pendingProductOrdersCount}">0</span>
            </a>
        </li>



        <li th:if="${session.loggedUser != null and session.loggedUser.role.name() == 'ADMIN'}">
            <a href="/admin" class="nav-link text-warning fw-bold d-flex align-items-center justify-content-between">
                <span>
                    Адмін панель
                </span>
            </a>
        </li>
    </ul>
    <hr>
    <div th:if="${session.loggedUser == null}">
        <a href="/auth" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center fw-bold">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-box-arrow-in-right me-2" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M6 3.5a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2A1.5 1.5 0 0 0 6.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-8A1.5 1.5 0 0 0 5 3.5v2a.5.5 0 0 0 1 0v-2z"/>
                <path fill-rule="evenodd" d="M11.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H1.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
            </svg>
            Увійти
        </a>
    </div>
    <div th:if="${session.loggedUser != null}" class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle w-100"
           data-bs-toggle="dropdown" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor"
                 class="bi bi-person-circle me-2" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
            </svg>
            <strong th:text="${session.loggedUser.username}"></strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow w-100">
            <li><a class="dropdown-item" href="/profile">Акаунт</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="/logout">Вийти</a></li>
        </ul>
    </div>
</div>

</body>
</html>
