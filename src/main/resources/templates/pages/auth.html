<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content" class="container d-flex justify-content-center align-items-center">
    <div class="card shadow-lg border-0 border-top border-3 border-danger w-50">
        <div class="card-header bg-light pt-4 pb-0 border-0">
            <ul class="nav nav-tabs card-header-tabs w-100 d-flex" id="authTabs" role="tablist">
                <li class="nav-item flex-fill text-center" role="presentation">
                    <button th:classappend="${activeTab == 'register' ? 'text-muted' : 'active'}"
                            class="nav-link w-100 fw-bold text-dark" id="login-tab" data-bs-toggle="tab"
                            data-bs-target="#login"
                            type="button" role="tab">Вхід
                    </button>
                </li>
                <li class="nav-item flex-fill text-center" role="presentation">
                    <button th:classappend="${activeTab == 'register' ? 'active' : 'text-muted'}"
                            class="nav-link w-100 fw-bold text-dark" id="register-tab" data-bs-toggle="tab"
                            data-bs-target="#register" type="button" role="tab">Реєстрація
                    </button>
                </li>
            </ul>
        </div>
        <div class="card-body p-4 p-md-5">
            <div class="tab-content" id="authTabsContent">
                <div class="tab-pane fade" th:classappend="${activeTab != 'register' ? 'show active' : ''}" id="login"
                     role="tabpanel">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-danger fs-1 mb-2 d-block"></i>
                        <h3 class="fw-bold">З поверненням!</h3>
                        <p class="text-muted">Увійдіть до свого облікового запису</p>
                    </div>
                    <div th:if="${loginError}" class="alert alert-danger" role="alert" th:text="${loginError}"></div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label fw-bold">Логін</label>
                            <input type="text" class="form-control form-control-lg" id="loginUsername" name="username"
                                   placeholder="Введіть ім'я користувача" th:value="${enteredUsername}" maxlength="50"
                                   required>
                        </div>
                        <div class="mb-4">
                            <label for="loginPassword" class="form-label fw-bold">Пароль</label>
                            <input type="password" class="form-control form-control-lg" id="loginPassword"
                                   name="password" placeholder="Введіть пароль" required minlength="8" maxlength="255">
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="showLoginPassword"
                                       onclick="togglePassword('loginPassword')">
                                <label class="form-check-label text-muted" for="showLoginPassword">Показати
                                    пароль</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger btn-lg w-100 mb-3 fw-bold"><i
                                class="bi bi-box-arrow-in-right me-2"></i>Увійти
                        </button>
                        <div class="text-center my-3">
                            <div class="d-flex align-items-center mb-3">
                                <hr class="flex-grow-1"><span class="mx-2 text-muted small">або</span><hr class="flex-grow-1">
                            </div>
                            <a href="/oauth2/authorization/google" class="btn btn-outline-secondary btn-lg w-100 fw-bold">
                                <img src="https://developers.google.com/identity/images/g-logo.png"
                                     width="20" height="20" class="me-2" alt="Google">
                                Увійти через Google
                            </a>
                        </div>
                    </form>
                </div>
                <div class="tab-pane fade" th:classappend="${activeTab == 'register' ? 'show active' : ''}"
                     id="register" role="tabpanel">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle text-danger fs-1 mb-2 d-block"></i>
                        <h3 class="fw-bold">Створити акаунт</h3>
                        <p class="text-muted">Заповніть дані для реєстрації</p>
                    </div>
                    <div th:if="${registerError}" class="alert alert-danger" role="alert"
                         th:text="${registerError}"></div>
                    <form th:action="@{/register}" method="post">
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label for="regFirstName" class="form-label fw-bold">Ім'я <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regFirstName" name="firstName"
                                       placeholder="Іван" th:value="${regFirstName}" maxlength="50" required>
                            </div>
                            <div class="col-md-6">
                                <label for="regLastName" class="form-label fw-bold">Прізвище <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="regLastName" name="lastName"
                                       placeholder="Шевченко" th:value="${regLastName}" maxlength="50" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="regMiddleName" class="form-label fw-bold">По-батькові <span
                                    class="text-muted fw-normal">(необов'язково)</span></label>
                            <input type="text" class="form-control" id="regMiddleName" name="middleName"
                                   placeholder="Іванович" th:value="${regMiddleName}" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label for="regPhone" class="form-label fw-bold">Номер телефону <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted">+38</span>
                                <input type="tel" class="form-control" id="regPhone" name="phone"
                                       placeholder="(0XX)-XXX-XX-XX" th:value="${regPhone}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="regUsername" class="form-label fw-bold">Логін<span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="regUsername" name="username"
                                   placeholder="Придумайте ім'я користувача" th:value="${regUsername}" maxlength="50"
                                   required>
                        </div>
                        <div class="mb-4">
                            <label for="regPassword" class="form-label fw-bold">Пароль <span
                                    class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="regPassword" name="password"
                                   placeholder="Введіть принаймні 8 символів" required minlength="8" maxlength="255">
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="showRegPassword"
                                       onclick="togglePassword('regPassword')">
                                <label class="form-check-label text-muted" for="showRegPassword">Показати пароль</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold"><i
                                class="bi bi-person-check me-2"></i>Зареєструватися
                        </button>
                        <div class="text-center my-3">
                            <div class="d-flex align-items-center mb-3">
                                <hr class="flex-grow-1"><span class="mx-2 text-muted small">або</span><hr class="flex-grow-1">
                            </div>
                            <a href="/oauth2/authorization/google" class="btn btn-outline-secondary btn-lg w-100 fw-bold">
                                <img src="https://developers.google.com/identity/images/g-logo.png"
                                     width="20" height="20" class="me-2" alt="Google">
                                Увійти через Google
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/pages/auth.js}"></script>
</div>

</body>
</html>
