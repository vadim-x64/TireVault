<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <h2 class="fw-bold mb-4">Користувачі</h2>
    <div class="card shadow border-0">
        <span class="badge bg-dark fs-6" th:text="${#lists.size(users)} + ' користувачів'"></span>
        <div class="card-header py-3 bg-dark">
            <h5 class="mb-0 fw-bold text-white">
                <i class="bi bi-people me-2"></i>
                Список користувачів
            </h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Логін</th>
                        <th>ПІБ</th>
                        <th>Телефон</th>
                        <th>Роль</th>
                        <th></th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7" class="text-center text-muted py-4">Користувачів не знайдено</td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td class="ps-4 text-muted small" th:text="${user.id}"></td>
                        <td>
                            <span class="fw-semibold" th:text="${user.username}"></span>
                        </td>
                        <td>
                            <span th:text="${user.customer.lastName + ' ' + user.customer.firstName +
                                (user.customer.middleName != null ? ' ' + user.customer.middleName : '')}"></span>
                        </td>
                        <td>
                            <span class="text-decoration-none text-dark"
                                  th:text="${user.customer.phone}"></span>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post">
                                <select name="role" class="form-select form-select-sm w-auto"
                                        onchange="this.form.submit()">
                                    <option th:each="r : ${roles}"
                                            th:value="${r.name()}"
                                            th:text="${r.name() == 'USER' ? 'Користувач' : (r.name() == 'MANAGER' ? 'Менеджер' : 'Адмін')}"
                                            th:selected="${r == user.role}">
                                    </option>
                                </select>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/block(id=${user.id})}" method="post">
                                <button type="submit"
                                        th:class="${user.blocked} ? 'btn btn-sm btn-success' : 'btn btn-sm btn-danger'"
                                        th:text="${user.blocked} ? 'Розблокувати' : 'Заблокувати'">
                                </button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                  th:attr="onsubmit='return confirm(\'Видалити користувача ' + ${user.username} + '? Разом з ним видаляться всі його замовлення та записи.\')'">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        title="Видалити користувача">
                                    Видалити
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
