<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>
<div th:fragment="content">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <a href="/admin" class="text-decoration-none text-muted small">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                     class="bi bi-arrow-left me-1" viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                          d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                </svg>
                Назад до адмін панелі
            </a>
            <h2 class="fw-bold mb-0 mt-1">Користувачі</h2>
        </div>
        <span class="badge bg-secondary fs-6" th:text="${#lists.size(users)} + ' користувачів'"></span>
    </div>

    <div class="card shadow border-0">
        <div class="card-header py-3" style="background-color: #212529;">
            <h5 class="mb-0 fw-bold text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                     class="bi bi-people me-2" viewBox="0 0 16 16">
                    <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8Zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002-.014.002H7.022ZM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816ZM4.92 10A5.493 5.493 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275ZM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0Zm3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/>
                </svg>
                Список користувачів
            </h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Логін</th>
                        <th>ПІБ</th>
                        <th>Телефон</th>
                        <th>Роль</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="5" class="text-center text-muted py-4">Користувачів не знайдено</td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td class="ps-4 text-muted small" th:text="${user.id}"></td>
                        <td>
                            <span class="fw-semibold" th:text="${user.username}"></span>
                        </td>
                        <td>
                            <span th:text="${user.customer.lastName + ' ' + user.customer.firstName +
                                (user.customer.middleName != null ? ' ' + user.customer.middleName : '')}"></span>
                        </td>
                        <td>
                            <a th:href="'tel:+38' + ${user.customer.phone}"
                               class="text-decoration-none text-dark"
                               th:text="${user.customer.phone}"></a>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post">
                                <select name="role" class="form-select form-select-sm" style="width: auto;"
                                        onchange="this.form.submit()">
                                    <option th:each="r : ${roles}"
                                            th:value="${r.name()}"
                                            th:text="${r.name() == 'USER' ? 'Користувач' : (r.name() == 'MANAGER' ? 'Менеджер' : 'Адмін')}"
                                            th:selected="${r == user.role}">
                                    </option>
                                </select>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/block(id=${user.id})}" method="post">
                                <button type="submit"
                                        th:class="${user.blocked} ? 'btn btn-sm btn-success' : 'btn btn-sm btn-danger'"
                                        th:text="${user.blocked} ? 'Розблокувати' : 'Заблокувати'">
                                </button>
                            </form>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                  th:attr="onsubmit='return confirm(\'Видалити користувача ' + ${user.username} + '? Разом з ним видаляться всі його замовлення та записи.\')'">
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Видалити користувача">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                                         class="bi bi-trash" viewBox="0 0 16 16">
                                        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                                        <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                                    </svg>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</body>
</html>
