<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <h2 class="fw-bold mb-4">Записи</h2>
    <ul class="nav nav-tabs mb-4" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active fw-bold text-dark" data-bs-toggle="tab"
                    data-bs-target="#adminActiveServices" type="button">
                Активні
                <span th:if="${#lists.size(activeOrders) > 0}"
                      class="badge bg-danger rounded-pill ms-1"
                      th:text="${#lists.size(activeOrders)}"></span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link fw-bold text-dark" data-bs-toggle="tab"
                    data-bs-target="#adminCompletedServices" type="button">
                Завершені
                <span th:if="${#lists.size(completedOrders) > 0}"
                      class="badge bg-success rounded-pill ms-1"
                      th:text="${#lists.size(completedOrders)}"></span>
            </button>
        </li>
    </ul>
    <div class="tab-content">
        <div class="tab-pane fade show active" id="adminActiveServices" role="tabpanel">
            <div th:if="${#lists.isEmpty(activeOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-inbox mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Активних записів немає</p>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(activeOrders)}">
                <div class="col-md-6 col-lg-4" th:each="req : ${activeOrders}">
                    <div class="card border-0 shadow-sm h-100 admin-service-card"
                         role="button"
                         th:attr="data-id=${req.id},
                        data-name=${req.customerName},
                        data-phone=${req.phone},
                        data-city=${req.city},
                        data-description=${req.description != null ? req.description : ''},
                        data-status=${req.status.name()},
                        data-created=${req.formattedDate},
                        data-scheduled=${req.formattedScheduledDate},
                        data-payment=${req.paymentMethod != null ? req.paymentMethod.name() : ''},
                        data-username=${req.user != null ? req.user.username : ''}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="fw-bold" th:text="${req.customerName}"></span>
                                <span th:if="${req.status.name() == 'PENDING'}"
                                      class="badge bg-danger d-flex align-items-center gap-1">
                                    <span class="rounded-circle bg-white d-inline-block"
                                          style="width:7px;height:7px;"></span>
                                    Нове
                                </span>
                                <span th:if="${req.status.name() == 'ACCEPTED'}"
                                      class="badge bg-warning text-dark">Прийнято</span>
                                <span th:if="${req.status.name() == 'SCHEDULED'}"
                                      class="badge bg-info text-dark">📅 Заброньовано</span>
                            </div>
                            <p class="text-muted small mb-1" th:if="${req.user != null}">
                                <i class="bi bi-person me-2"></i> <a th:href="@{/admin/users}"
                                                                     class="text-decoration-none text-dark fw-semibold"
                                                                     onclick="event.stopPropagation()"
                                                                     th:text="${req.user.username}"></a>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-geo-alt me-1"></i> <span th:text="${req.city}"></span>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${req.formattedDate}"></span>
                            </p>
                            <p class="text-muted small mb-0"
                               th:if="${req.formattedScheduledDate != null and !#strings.isEmpty(req.formattedScheduledDate)}">
                                <i class="bi bi-clock me-2"></i> <span th:text="${req.formattedScheduledDate}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="adminCompletedServices" role="tabpanel">
            <div th:if="${#lists.isEmpty(completedOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-check2-circle mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Завершених записів немає</p>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(completedOrders)}">
                <div class="col-md-6 col-lg-4" th:each="req : ${completedOrders}">
                    <div class="card border-0 shadow-sm h-100 admin-service-card"
                         role="button"
                         th:attr="data-id=${req.id},
                        data-name=${req.customerName},
                        data-phone=${req.phone},
                        data-city=${req.city},
                        data-description=${req.description != null ? req.description : ''},
                        data-status=${req.status.name()},
                        data-created=${req.formattedDate},
                        data-scheduled=${req.formattedScheduledDate},
                        data-payment=${req.paymentMethod != null ? req.paymentMethod.name() : ''},
                        data-username=${req.user != null ? req.user.username : ''}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="fw-bold" th:text="${req.customerName}"></span>
                                <span th:if="${req.status.name() == 'COMPLETED'}"
                                      class="badge bg-success">Виконано</span>
                                <span th:if="${req.status.name() == 'CANCELLED'}"
                                      class="badge bg-secondary">Скасовано</span>
                            </div>
                            <p class="text-muted small mb-1" th:if="${req.user != null}">
                                <i class="bi bi-person me-2"></i> <a th:href="@{/admin/users}"
                                                                     class="text-decoration-none text-dark fw-semibold"
                                                                     onclick="event.stopPropagation()"
                                                                     th:text="${req.user.username}"></a>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-geo-alt me-1"></i> <span th:text="${req.city}"></span>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${req.formattedDate}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="adminServiceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark">
                    <h5 class="modal-title text-white fw-bold">Деталі запису на СТО</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3 text-center">
                        <span id="adminServiceStatusBadge" class="badge fs-6 px-3 py-2">Статус</span>
                    </div>
                    <table class="table table-borderless mb-0">
                        <tbody>
                        <tr>
                            <td class="text-muted fw-bold">Користувач</td>
                            <td>
                                <a id="adminServiceUsernameLink" href="/admin/users"
                                   class="fw-bold text-decoration-none text-dark"></a>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Ім'я клієнта</td>
                            <td id="adminServiceName"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Телефон</td>
                            <td id="adminServicePhone"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Місто</td>
                            <td id="adminServiceCity"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Дата подачі</td>
                            <td id="adminServiceCreated"></td>
                        </tr>
                        <tr id="adminServiceScheduledRow" class="d-none">
                            <td class="text-muted fw-bold">Заплановано на</td>
                            <td id="adminServiceScheduled"></td>
                        </tr>
                        <tr id="adminServicePaymentRow" class="d-none">
                            <td class="text-muted fw-bold">Оплата</td>
                            <td id="adminServicePayment"></td>
                        </tr>
                        <tr id="adminServiceDescRow" class="d-none">
                            <td class="text-muted fw-bold">Опис</td>
                            <td id="adminServiceDescription"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/pages/admin/services.js}"></script>
</div>

</body>
</html>
