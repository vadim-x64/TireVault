<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <h2 class="fw-bold mb-4">Журнал відгуків</h2>
    <div th:if="${reviews.isEmpty()}" class="text-muted text-center py-5">
        <i class="bi bi-chat-square fs-1 d-block mb-2"></i>Відгуків ще немає
    </div>
    <div class="card shadow border-0">
        <div th:unless="${reviews.isEmpty()}" class="table-responsive">
            <table class="table table-sm align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Автор</th>
                    <th>Ціль</th>
                    <th>Тип</th>
                    <th>Коментар</th>
                    <th>Дата</th>
                    <th><i class="bi bi-heart-fill text-danger"></i></th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="review : ${reviews}">
                    <td th:text="${review.id}"></td>
                    <td th:text="${review.user.username}"></td>
                    <td>
                        <a th:href="${targetLinks.get(review.targetType + '_' + review.targetId)
                                      + '#review-' + review.id}"
                           class="text-decoration-none text-dark small"
                           th:text="${targetNames.get(review.targetType + '_' + review.targetId) ?: '—'}">
                        </a>
                    </td>
                    <td>
                        <span th:if="${review.parent == null}"
                              class="badge bg-primary-subtle text-primary border border-primary-subtle">
                            коментар</span>
                        <span th:unless="${review.parent == null}"
                              class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">
                            відповідь</span>
                    </td>
                    <td class="text-muted small"
                        th:text="${#strings.abbreviate(review.content, 20)}"></td>
                    <td class="small text-muted"
                        th:text="${#temporals.format(review.createdAt,'dd.MM.yy HH:mm')}"></td>
                    <td th:text="${review.likes.size()}"></td>
                    <td class="text-end">
                        <form th:action="${session.loggedUser.role.name() == 'MANAGER'
                   ? '/manager/reviews/' + review.id + '/delete'
                   : '/admin/reviews/' + review.id + '/delete'}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Видалити відгук та всі відповіді до нього?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
