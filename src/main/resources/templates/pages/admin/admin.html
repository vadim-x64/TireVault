<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <h2 class="fw-bold mb-4">Панель адміністратора</h2>
    <div class="mb-4">
        <img th:src="@{/assets/admin/main-page.png}" alt="..." class="img-fluid w-100"
            >
    </div>
    <div class="row g-3">
        <div class="col-md-4">
            <a href="/admin/users" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center p-3 flex-shrink-0">
                            <i class="bi bi-people text-white fs-4 lh-1"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Користувачі</div>
                            <div class="text-muted small">Перегляд та управління ролями</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/orders" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center p-3 flex-shrink-0">
                            <i class="bi bi-bag text-white fs-4 lh-1"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Замовлення</div>
                            <div class="text-muted small">Перегляд замовлень магазину</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/services" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center p-3 flex-shrink-0">
                            <i class="bi bi-tools text-white fs-4 lh-1"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Записи</div>
                            <div class="text-muted small">Перегляд заявок на обслуговування</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/workservices" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center p-3 flex-shrink-0">
                            <i class="bi bi-wrench-adjustable-circle text-white fs-4 lh-1"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Послуги</div>
                            <div class="text-muted small">Категорії та перелік послуг</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/products" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center p-3 flex-shrink-0">
                            <i class="bi bi-box-seam text-white fs-4 lh-1"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Автотовари</div>
                            <div class="text-muted small">Категорії та товари магазину</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/vehicles" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center p-3 flex-shrink-0">
                            <i class="bi bi-car-front text-white fs-4 lh-1"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Автомобілі</div>
                            <div class="text-muted small">Параметри сортування товарів</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
