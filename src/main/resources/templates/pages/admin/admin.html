<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <h2 class="fw-bold mb-4">Панель адміністратора</h2>
    <div class="row g-3">
        <div class="col-md-4">
            <a href="/admin/users" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:50px; height:50px; background-color:#212529;">
                            <i class="bi bi-people text-white fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Користувачі</div>
                            <div class="text-muted small">Перегляд та управління ролями</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/orders" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:50px; height:50px; background-color:#212529;">
                            <i class="bi bi-bag text-white fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Замовлення</div>
                            <div class="text-muted small">Перегляд замовлень магазину</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/services" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:50px; height:50px; background-color:#212529;">
                            <i class="bi bi-tools text-white fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Записи на СТО</div>
                            <div class="text-muted small">Перегляд заявок на обслуговування</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/workservices" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:50px; height:50px; background-color:#212529;">
                            <i class="bi bi-wrench-adjustable-circle text-white fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Послуги СТО</div>
                            <div class="text-muted small">Категорії та перелік послуг</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/admin/products" class="text-decoration-none">
                <div class="card shadow border-0 h-100 hover-shadow">
                    <div class="card-body d-flex align-items-center gap-3 p-4">
                        <div class="rounded-circle d-flex align-items-center justify-content-center"
                             style="width:50px; height:50px; background-color:#212529;">
                            <i class="bi bi-box-seam text-white fs-4"></i>
                        </div>
                        <div>
                            <div class="fw-bold text-dark fs-5">Каталог товарів</div>
                            <div class="text-muted small">Категорії та товари магазину</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
