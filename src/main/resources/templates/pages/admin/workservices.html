<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>
<div th:fragment="content">

    <h2 class="fw-bold mb-4">Управління послугами</h2>
    <a href="/admin" class="btn btn-outline-secondary btn-sm mb-4">
        <i class="bi bi-arrow-left me-1"></i>
        Назад до панелі
    </a>

    <div class="card shadow border-0 mb-4">
        <div class="card-header py-3 d-flex align-items-center justify-content-between"
             style="background-color:#212529; color:white;">
            <h5 class="mb-0">Категорії послуг</h5>
        </div>
        <div class="card-body">


            <form th:action="@{/admin/workservices/categories/add}" method="post"
                  class="d-flex gap-2 mb-3">
                <input type="text" name="name" class="form-control" style="max-width:300px;"
                       placeholder="Назва нової категорії" required>
                <button type="submit" class="btn btn-dark">Додати</button>
            </form>

            <div th:if="${categories.isEmpty()}" class="text-muted">Категорій ще немає</div>

            <table th:unless="${categories.isEmpty()}" class="table table-sm align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Назва</th>
                    <th>Послуг</th>
                    <th style="width:220px;"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.id}"></td>
                    <td th:text="${cat.name}"></td>
                    <td th:text="${cat.workServices != null ? cat.workServices.size() : 0}"></td>
                    <td class="text-end">
                        <!-- Кнопка «Редагувати» відкриває модалку -->
                        <button type="button" class="btn btn-sm btn-outline-secondary me-1"
                                data-bs-toggle="modal" data-bs-target="#editCategoryModal"
                                th:data-id="${cat.id}"
                                th:data-name="${cat.name}">
                            Редагувати
                        </button>
                        <!-- Видалити (разом з послугами категорії) -->
                        <form th:action="@{/admin/workservices/categories/{id}/delete(id=${cat.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Видалити категорію разом з усіма її послугами?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Видалити</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>


    <div class="card shadow border-0">
        <div class="card-header py-3"
             style="background-color:#212529; color:white;">
            <h5 class="mb-0">Послуги</h5>
        </div>
        <div class="card-body">


            <form th:action="@{/admin/workservices/add}" method="post"
                  class="row g-2 align-items-end mb-4 p-3 bg-light rounded border">
                <h6 class="fw-bold mb-1">Нова послуга</h6>
                <div class="col-md-2">
                    <label class="form-label small mb-1">Категорія</label>
                    <select name="categoryId" class="form-select form-select-sm" required>
                        <option value="" disabled selected>— обрати —</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1">Назва</label>
                    <input type="text" name="name" class="form-control form-control-sm"
                           placeholder="Назва послуги" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-1">Опис</label>
                    <input type="text" name="description" class="form-control form-control-sm"
                           placeholder="Короткий опис">
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1">Ціна (₴)</label>
                    <input type="number" name="price" class="form-control form-control-sm"
                           step="0.01" min="0" placeholder="0.00" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1">Тривалість</label>
                    <input type="text" name="workingHours" class="form-control form-control-sm"
                           placeholder="напр. 30-60 хв.">
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-dark btn-sm w-100 mt-3">Додати</button>
                </div>
            </form>

            <div th:if="${workServices.isEmpty()}" class="text-muted">Послуг ще немає</div>

            <div th:unless="${workServices.isEmpty()}" class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Категорія</th>
                        <th>Назва</th>
                        <th>Опис</th>
                        <th>Ціна</th>
                        <th>Тривалість</th>
                        <th style="width:160px;"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ws : ${workServices}">
                        <td th:text="${ws.id}"></td>
                        <td th:text="${ws.category.name}"></td>
                        <td th:text="${ws.name}"></td>
                        <td class="text-muted small"
                            th:text="${ws.description != null ? ws.description : '—'}"></td>
                        <td th:text="${ws.price} + ' ₴'"></td>
                        <td th:text="${ws.workingHours != null ? ws.workingHours : '—'}"></td>
                        <td class="text-end">
                            <button type="button" class="btn btn-sm btn-outline-secondary me-1"
                                    data-bs-toggle="modal" data-bs-target="#editServiceModal"
                                    th:data-id="${ws.id}"
                                    th:data-category-id="${ws.category.id}"
                                    th:data-name="${ws.name}"
                                    th:data-description="${ws.description}"
                                    th:data-price="${ws.price}"
                                    th:data-working-hours="${ws.workingHours}">
                                Ред.
                            </button>
                            <form th:action="@{/admin/workservices/{id}/delete(id=${ws.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Видалити цю послугу?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Вид.</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <form method="post" id="editCategoryForm">
                <div class="modal-content">
                    <div class="modal-header" style="background-color:#212529; color:white;">
                        <h5 class="modal-title">Редагувати категорію</h5>
                        <button type="button" class="btn-close btn-close-white"
                                data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <label class="form-label">Назва</label>
                        <input type="text" name="name" id="editCategoryName"
                               class="form-control" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Скасувати</button>
                        <button type="submit" class="btn btn-dark">Зберегти</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Редагування послуги -->
    <div class="modal fade" id="editServiceModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <form method="post" id="editServiceForm">
                <div class="modal-content">
                    <div class="modal-header" style="background-color:#212529; color:white;">
                        <h5 class="modal-title">Редагувати послугу</h5>
                        <button type="button" class="btn-close btn-close-white"
                                data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Категорія</label>
                            <select name="categoryId" id="editServiceCategory"
                                    class="form-select" required>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Назва</label>
                            <input type="text" name="name" id="editServiceName"
                                   class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Опис</label>
                            <input type="text" name="description" id="editServiceDescription"
                                   class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Ціна (₴)</label>
                            <input type="number" name="price" id="editServicePrice"
                                   class="form-control" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Тривалість</label>
                            <input type="text" name="workingHours" id="editServiceWorkingHours"
                                   class="form-control">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                                data-bs-dismiss="modal">Скасувати</button>
                        <button type="submit" class="btn btn-dark">Зберегти</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- JS: наповнення модалок даними -->
    <script th:src="@{/js/pages/admin/workservices.js}">

    </script>

</div>
</body>
</html>
