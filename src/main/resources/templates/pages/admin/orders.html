<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <h2 class="fw-bold mb-4">Замовлення</h2>
    <ul class="nav nav-tabs mb-4" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active fw-bold text-dark" data-bs-toggle="tab"
                    data-bs-target="#adminActiveOrders" type="button">
                Активні
                <span th:if="${#lists.size(activeOrders) > 0}"
                      class="badge bg-danger rounded-pill ms-1"
                      th:text="${#lists.size(activeOrders)}"></span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link fw-bold text-dark" data-bs-toggle="tab"
                    data-bs-target="#adminCompletedOrders" type="button">
                Завершені
                <span th:if="${#lists.size(completedOrders) > 0}"
                      class="badge bg-success rounded-pill ms-1"
                      th:text="${#lists.size(completedOrders)}"></span>
            </button>
        </li>
    </ul>
    <div class="tab-content">
        <div class="tab-pane fade show active" id="adminActiveOrders" role="tabpanel">
            <div th:if="${#lists.isEmpty(activeOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-inbox mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Активних замовлень немає</p>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(activeOrders)}">
                <div class="col-md-6 col-lg-4" th:each="order : ${activeOrders}">
                    <div class="card border-0 shadow-sm h-100 admin-order-card"
                         role="button"
                         th:attr="data-id=${order.id},
                        data-username=${order.user.username},
                        data-fullname=${order.customerInfo},
                        data-phone=${order.customerPhone},
                        data-status=${order.status.name()},
                        data-created=${order.formattedDate},
                        data-total=${order.total},
                        data-station=${order.station != null ? order.station : ''},
                        data-paymethod=${order.payMethod != null ? order.payMethod : ''},
                        data-items=${order.itemsJson},
                        data-userid=${order.user.id}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="fw-bold">Замовлення #<span th:text="${order.orderNumber}"></span></span>
                                <span th:if="${order.status.name() == 'PENDING'}"
                                      class="badge bg-danger d-flex align-items-center gap-1">
                                      <span class="rounded-circle bg-white d-inline-block"
                                            style="width:7px;height:7px;"></span>
                                      Нове
                                    </span>
                                <span th:if="${order.status.name() == 'PROCESSING'}"
                                      class="badge bg-warning text-dark">Виконується</span>
                            </div>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-person me-2"></i> <a th:href="@{/admin/users}"
                                                                     class="text-decoration-none text-dark fw-semibold"
                                                                     onclick="event.stopPropagation()"
                                                                     th:text="${order.user.username}"></a>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${order.formattedDate}"></span>
                            </p>
                            <p class="fw-bold mb-0 mt-2" th:text="${order.total} + ' ₴'"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="adminCompletedOrders" role="tabpanel">
            <div th:if="${#lists.isEmpty(completedOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-check2-circle mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Завершених замовлень немає</p>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(completedOrders)}">
                <div class="col-md-6 col-lg-4" th:each="order : ${completedOrders}">
                    <div class="card border-0 shadow-sm h-100 admin-order-card"
                         role="button"
                         th:attr="data-id=${order.id},
                        data-username=${order.user.username},
                        data-fullname=${order.customerInfo},
                        data-phone=${order.customerPhone},
                        data-status=${order.status.name()},
                        data-created=${order.formattedDate},
                        data-total=${order.total},
                        data-station=${order.station != null ? order.station : ''},
                        data-paymethod=${order.payMethod != null ? order.payMethod : ''},
                        data-items=${order.itemsJson},
                        data-userid=${order.user.id}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="fw-bold">Замовлення #<span th:text="${order.orderNumber}"></span></span>
                                <span th:if="${order.status.name() == 'COMPLETED'}"
                                      class="badge bg-success">Виконано</span>
                                <span th:if="${order.status.name() == 'CANCELLED'}"
                                      class="badge bg-secondary">Скасовано</span>
                            </div>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-person me-2"></i> <a th:href="@{/admin/users}"
                                                                     class="text-decoration-none text-dark fw-semibold"
                                                                     onclick="event.stopPropagation()"
                                                                     th:text="${order.user.username}"></a>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${order.formattedDate}"></span>
                            </p>
                            <p class="fw-bold mb-0 mt-2" th:text="${order.total} + ' ₴'"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="adminOrderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark">
                    <h5 class="modal-title text-white fw-bold">Деталі замовлення</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3 text-center">
                        <span id="adminOrderStatusBadge" class="badge fs-6 px-3 py-2">Статус</span>
                    </div>
                    <table class="table table-borderless mb-3">
                        <tbody>
                        <tr>
                            <td class="text-muted fw-bold">Користувач</td>
                            <td>
                                <a id="adminOrderUsernameLink" href="/admin/users"
                                   class="fw-bold text-decoration-none text-dark"></a>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">ПІБ</td>
                            <td id="adminOrderFullname"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Телефон</td>
                            <td id="adminOrderPhone"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Дата замовлення</td>
                            <td id="adminOrderCreated"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Адреса</td>
                            <td id="adminOrderStation"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold">Спосіб оплати</td>
                            <td id="adminOrderPayMethod"></td>
                        </tr>
                        </tbody>
                    </table>
                    <h6 class="fw-bold mb-2">Товари:</h6>
                    <table class="table table-sm table-bordered">
                        <thead class="table-dark">
                        <tr>
                            <th>Назва</th>
                            <th class="text-center">К-сть</th>
                            <th class="text-end">Ціна</th>
                            <th class="text-end">Сума</th>
                        </tr>
                        </thead>
                        <tbody id="adminOrderItems"></tbody>
                        <tfoot>
                        <tr>
                            <td colspan="3" class="text-end fw-bold">Разом:</td>
                            <td class="text-end fw-bold" id="adminOrderTotal"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/pages/admin/orders.js}"></script>
</div>

</body>
</html>
