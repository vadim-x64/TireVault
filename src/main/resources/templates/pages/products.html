<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">

    <!-- Категорії -->
    <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
        <a href="/products"
           th:classappend="${selectedCategoryId == null} ? 'btn-dark' : 'btn-outline-dark'"
           class="btn btn-sm fw-bold">
            Всі товари
        </a>
        <a th:each="cat : ${categories}"
           th:href="@{/products/category/{id}(id=${cat.id})}"
           th:text="${cat.name}"
           th:classappend="${selectedCategoryId == cat.id} ? 'btn-dark' : 'btn-outline-dark'"
           class="btn btn-sm fw-bold">
        </a>
    </div>

    <!-- Товари -->
    <div th:if="${products.isEmpty()}" class="text-center text-muted py-5">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor"
             class="bi bi-box-seam mb-3 d-block mx-auto" viewBox="0 0 16 16">
            <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5 8.186 1.113z"/>
            <path d="M15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zm-13 0v7.922l6.5 2.6V6.838L2 4.24z"/>
        </svg>
        <p>Товарів у цій категорії поки немає</p>
    </div>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100 shadow-sm border-0">
                <!-- Фото -->
                <a th:href="@{/products/{id}(id=${product.id})}">
                    <img th:src="${product.imageUrl != null ? product.imageUrl : '/img/no-image.png'}"
                         class="card-img-top object-fit-cover"
                         style="height: 180px;"
                         th:alt="${product.name}">
                </a>
                <div class="card-body d-flex flex-column p-3">
                    <!-- Назва -->
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       th:text="${product.name}"
                       class="card-title fw-bold text-dark text-decoration-none mb-1"
                       style="font-size: 0.9rem; line-height: 1.3;">
                    </a>
                    <!-- Наявність -->
                    <span th:if="${product.availability}"
                          class="badge bg-success-subtle text-success border border-success-subtle mb-2"
                          style="width: fit-content; font-size: 0.75rem;">В наявності</span>
                    <span th:unless="${product.availability}"
                          class="badge bg-danger-subtle text-danger border border-danger-subtle mb-2"
                          style="width: fit-content; font-size: 0.75rem;">Немає в наявності</span>
                    <!-- Ціна -->
                    <p class="fw-bold mb-2 mt-auto" style="color: #212529;">
                        <span th:text="${product.price}"></span> ₴
                    </p>
                    <!-- Кнопка -->
                    <button class="btn btn-dark btn-sm w-100 btn-add-to-cart"
                            th:disabled="${!product.availability}"
                            th:data-product-id="${product.id}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                             class="bi bi-cart-plus me-1" viewBox="0 0 16 16">
                            <path d="M9 5.5a.5.5 0 0 0-1 0V7H6.5a.5.5 0 0 0 0 1H8v1.5a.5.5 0 0 0 1 0V8h1.5a.5.5 0 0 0 0-1H9V5.5z"/>
                            <path d="M.5 1a.5.5 0 0 0 0 1h1.11l.401 1.607 1.498 7.985A.5.5 0 0 0 4 12h1a2 2 0 1 0 0 4 2 2 0 0 0 0-4h7a2 2 0 1 0 0 4 2 2 0 0 0 0-4h1a.5.5 0 0 0 .491-.408l1.5-8A.5.5 0 0 0 14.5 3H2.89l-.405-1.621A.5.5 0 0 0 2 1H.5z"/>
                        </svg>
                        В кошик
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
