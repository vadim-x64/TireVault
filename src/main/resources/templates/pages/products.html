<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
        <a href="/products"
           th:classappend="${selectedCategoryId == null} ? 'btn-dark' : 'btn-outline-dark'"
           class="btn btn-sm fw-bold">
            Всі товари
        </a>
        <a th:each="cat : ${categories}"
           th:href="@{/products/category/{id}(id=${cat.id})}"
           th:text="${cat.name}"
           th:classappend="${selectedCategoryId == cat.id} ? 'btn-dark' : 'btn-outline-dark'"
           class="btn btn-sm fw-bold">
        </a>
    </div>
    <form th:action="@{/products}" method="get" id="filterForm" class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <input type="hidden" name="categoryId" th:value="${selectedCategoryId}">
            <div class="row g-2 align-items-end">
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1">Марка</label>
                    <select id="filterBrand" name="brand" class="form-select form-select-sm">
                        <option value="">Всі марки</option>
                    </select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1">Модель</label>
                    <select id="filterModel" name="vmodel" class="form-select form-select-sm" disabled>
                        <option value="">Всі моделі</option>
                    </select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1">Рік</label>
                    <select id="filterYear" name="year" class="form-select form-select-sm" disabled>
                        <option value="">Всі роки</option>
                    </select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                    <label class="form-label small mb-1">Двигун</label>
                    <select id="filterMod" name="modification" class="form-select form-select-sm" disabled>
                        <option value="">Всі</option>
                    </select>
                </div>
                <div class="col-6 col-md-2 col-lg-1">
                    <label class="form-label small mb-1">Від (₴)</label>
                    <input type="number" name="minPrice" class="form-control form-control-sm"
                           min="0" step="1" placeholder="0"
                           th:value="${filterMinPrice}">
                </div>
                <div class="col-6 col-md-2 col-lg-1">
                    <label class="form-label small mb-1">До (₴)</label>
                    <input type="number" name="maxPrice" class="form-control form-control-sm"
                           min="0" step="1" placeholder="∞"
                           th:value="${filterMaxPrice}">
                </div>
                <div class="col-md-auto">
                    <label class="form-label small mb-1 d-block">Наявність</label>
                    <div class="d-flex gap-3">
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="radio" name="availability"
                                   id="avAll" value=""
                                   th:checked="${filterAvailability == null or filterAvailability == ''}">
                            <label class="form-check-label small" for="avAll">Всі</label>
                        </div>
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="radio" name="availability"
                                   id="avTrue" value="true"
                                   th:checked="${filterAvailability == 'true'}">
                            <label class="form-check-label small" for="avTrue">В наявності</label>
                        </div>
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="radio" name="availability"
                                   id="avFalse" value="false"
                                   th:checked="${filterAvailability == 'false'}">
                            <label class="form-check-label small" for="avFalse">Немає</label>
                        </div>
                    </div>
                </div>
                <div class="col-auto ms-auto d-flex gap-2 align-items-end">
                    <button type="submit" class="btn btn-dark btn-sm">Застосувати</button>
                    <a th:href="${selectedCategoryId != null} ? '/products?categoryId=' + ${selectedCategoryId} : '/products'"
                       class="btn btn-outline-secondary btn-sm">Скинути</a>
                </div>

            </div>
        </div>
    </form>
    <div th:if="${products.isEmpty()}" class="text-center text-muted py-5">
        <i class="bi bi-box-seam fs-1 d-block mb-3"></i>
        <p>Товарів у цій категорії поки немає</p>
    </div>
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100 shadow-sm border-0 position-relative">
                <a th:href="@{/products/{id}(id=${product.id})}">
                    <div class="ratio ratio-4x3">
                        <img th:src="${product.imageUrl != null ? product.imageUrl : '/img/no-image.png'}"
                             class="card-img-top object-fit-contain w-100 h-100"
                             th:alt="${product.name}">
                    </div>
                </a>
                <span th:if="${product.availability}"
                      class="badge bg-success-subtle text-success border border-success-subtle
                 position-absolute top-0 end-0 m-2 small">
        В наявності
    </span>
                <span th:unless="${product.availability}"
                      class="badge bg-danger-subtle text-danger border border-danger-subtle
                 position-absolute top-0 end-0 m-2 small">
        Немає в наявності
    </span>
                <div class="card-body d-flex flex-column p-3">
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       th:text="${product.name}"
                       class="card-title fw-bold text-dark text-decoration-none mb-1 small lh-sm">
                    </a>
                    <p class="fw-bold mb-2 mt-auto text-danger">
                        <span th:text="${product.price}"></span> ₴
                    </p>
                    <button class="btn btn-dark btn-sm w-100 btn-add-to-cart"
                            th:disabled="${!product.availability}"
                            th:data-product-id="${product.id}">
                        <i class="bi bi-cart-plus me-1"></i>В кошик
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const allVehicles = [];
        /*[# th:each="v : ${vehicles}"]*/
        allVehicles.push({
            brand:        /*[[${v.brand}]]*/ '',
            model:        /*[[${v.model}]]*/ '',
            year:         /*[[${v.year}]]*/ 0,
            modification: /*[[${v.modification}]]*/ ''
        });
        /*[/]*/

        const selBrand = /*[[${filterBrand}]]*/ null;
        const selModel = /*[[${filterVmodel}]]*/ null;
        const selYear = /*[[${filterYear}]]*/ null;
        const selMod = /*[[${filterModification}]]*/ null;
        const elBrand = document.getElementById('filterBrand');
        const elModel = document.getElementById('filterModel');
        const elYear = document.getElementById('filterYear');
        const elMod = document.getElementById('filterMod');

        function fillSelect(el, values, preselect) {
            const current = el.options[0]; // зберігаємо "Всі..."
            el.innerHTML = '';
            el.add(current);
            values.forEach(v => {
                const opt = new Option(v, v);
                if (String(v) === String(preselect)) opt.selected = true;
                el.add(opt);
            });
            el.disabled = values.length === 0;
        }

        function unique(arr) {
            return [...new Set(arr)].sort();
        }

        function loadBrands() {
            const brands = unique(allVehicles.map(v => v.brand));
            fillSelect(elBrand, brands, selBrand);
            if (selBrand) loadModels();
        }

        function loadModels() {
            const brand = elBrand.value;
            const models = unique(allVehicles.filter(v => v.brand === brand).map(v => v.model));
            fillSelect(elModel, models, selModel);
            elYear.innerHTML = '<option value="">Всі роки</option>';
            elYear.disabled = true;
            elMod.innerHTML = '<option value="">Всі</option>';
            elMod.disabled = true;
            if (selModel && elModel.value) loadYears();
        }

        function loadYears() {
            const brand = elBrand.value, model = elModel.value;
            const years = unique(allVehicles.filter(v => v.brand === brand && v.model === model).map(v => v.year))
                .sort((a, b) => b - a);
            fillSelect(elYear, years, selYear);
            elMod.innerHTML = '<option value="">Всі</option>';
            elMod.disabled = true;
            if (selYear && elYear.value) loadMods();
        }

        function loadMods() {
            const brand = elBrand.value, model = elModel.value, year = Number(elYear.value);
            const mods = unique(allVehicles
                .filter(v => v.brand === brand && v.model === model && v.year === year)
                .map(v => v.modification));
            fillSelect(elMod, mods, selMod);
        }

        elBrand.addEventListener('change', loadModels);
        elModel.addEventListener('change', loadYears);
        elYear.addEventListener('change', loadMods);
        loadBrands();
        /*]]>*/
    </script>
</div>

</body>
</html>
