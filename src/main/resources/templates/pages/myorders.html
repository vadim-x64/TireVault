<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content" class="container-fluid py-4">

    <div class="d-flex align-items-center mb-4">
                <h3 class="fw-bold mb-0">Мої замовлення</h3>
    </div>

    <div th:if="${cancelError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>Помилка:</strong> <span th:text="${cancelError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <ul class="nav nav-tabs mb-4" id="ordersTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active fw-bold text-dark" data-bs-toggle="tab"
                    data-bs-target="#activeOrders" type="button" role="tab">
                Активні
                <span th:if="${#lists.size(activeOrders) > 0}"
                      class="badge bg-danger rounded-pill ms-1"
                      th:text="${#lists.size(activeOrders)}"></span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link fw-bold text-dark" data-bs-toggle="tab"
                    data-bs-target="#completedOrders" type="button" role="tab">
                Завершені
                <span th:if="${#lists.size(completedOrders) > 0}"
                      class="badge bg-success rounded-pill ms-1"
                      th:text="${#lists.size(completedOrders)}"></span>
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- АКТИВНІ -->
        <div class="tab-pane fade show active" id="activeOrders" role="tabpanel">
            <div th:if="${#lists.isEmpty(activeOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-inbox mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Активних замовлень немає</p>
                <a href="/products" class="btn btn-danger">Перейти до каталогу</a>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(activeOrders)}">
                <div class="col-md-6 col-lg-4" th:each="order : ${activeOrders}">
                    <div class="card border-0 shadow-sm h-100 myorder-card"
                         role="button"
                         th:attr="data-id=${order.id},
                                  data-status=${order.status.name()},
                                  data-created=${order.formattedDate},
                                  data-total=${order.total},
                                  data-station=${order.station != null ? order.station : ''},
                                  data-paymethod=${order.payMethod != null ? order.payMethod : ''},
                                  data-items=${order.itemsJson}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="fw-bold">Замовлення #<span th:text="${order.orderNumber}"></span></span>
                                <span th:if="${order.status.name() == 'PENDING'}"
                                      class="badge bg-danger">В обробці</span>
                                <span th:if="${order.status.name() == 'PROCESSING'}"
                                      class="badge bg-warning text-dark">Виконується</span>
                            </div>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${order.formattedDate}"></span>
                            </p>
                            <p class="fw-bold mb-0 mt-2" th:text="${order.total} + ' ₴'"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ЗАВЕРШЕНІ -->
        <div class="tab-pane fade" id="completedOrders" role="tabpanel">
            <div th:if="${#lists.isEmpty(completedOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-check2-circle mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Завершених замовлень немає</p>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(completedOrders)}">
                <div class="col-md-6 col-lg-4" th:each="order : ${completedOrders}">
                    <div class="card border-0 shadow-sm h-100 myorder-card position-relative"
                         role="button"
                         th:attr="data-id=${order.id},
                                  data-status=${order.status.name()},
                                  data-created=${order.formattedDate},
                                  data-total=${order.total},
                                  data-station=${order.station != null ? order.station : ''},
                                  data-paymethod=${order.payMethod != null ? order.payMethod : ''},
                                  data-items=${order.itemsJson}">
                        <form th:action="@{/myorders/{id}/delete(id=${order.id})}"
                              method="post"
                              onsubmit="return confirm('Видалити замовлення зі списку?')"
                              onclick="event.stopPropagation()">
                            <button type="submit" class="btn btn-sm btn-close position-absolute bottom-0 end-0 m-2"
                                    title="Видалити"></button>
                        </form>
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="fw-bold">Замовлення #<span th:text="${order.orderNumber}"></span></span>
                                <span th:if="${order.status.name() == 'COMPLETED'}"
                                      class="badge bg-success">Виконано</span>
                                <span th:if="${order.status.name() == 'CANCELLED'}"
                                      class="badge bg-secondary">Скасовано</span>
                            </div>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${order.formattedDate}"></span>
                            </p>
                            <p class="fw-bold mb-0 mt-2" th:text="${order.total} + ' ₴'"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА КЛІЄНТА -->
    <div class="modal fade" id="myOrderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark">
                    <h5 class="modal-title text-white fw-bold">Деталі замовлення</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3 text-center">
                        <span id="myOrderStatusBadge" class="badge fs-6 px-3 py-2">Статус</span>
                    </div>
                    <table class="table table-borderless mb-3">
                        <tbody>
                        <tr>
                            <td class="text-muted fw-bold pe-3 text-nowrap">Дата замовлення</td>
                            <td id="myOrderCreated"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold pe-3 text-nowrap">Відділення СТО</td>
                            <td id="myOrderStation"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold pe-3 text-nowrap">Спосіб оплати</td>
                            <td id="myOrderPayMethod"></td>
                        </tr>
                        </tbody>
                    </table>

                    <h6 class="fw-bold mb-2">Товари:</h6>
                    <table class="table table-sm table-bordered">
                        <thead class="table-dark">
                        <tr>
                            <th>Назва</th>
                            <th class="text-center">К-сть</th>
                            <th class="text-end">Ціна</th>
                            <th class="text-end">Сума</th>
                        </tr>
                        </thead>
                        <tbody id="myOrderItems"></tbody>
                        <tfoot>
                        <tr>
                            <td colspan="3" class="text-end fw-bold">Разом:</td>
                            <td class="text-end fw-bold" id="myOrderTotal"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
                <div class="modal-footer d-flex justify-content-between align-items-center">
                    <div id="myOrderCancelSection" class="d-none">
                        <form id="myOrderCancelForm" method="post"
                              onsubmit="return confirm('Скасувати замовлення?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Скасувати замовлення</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/pages/myorders.js}"></script>
</div>

</body>
</html>
