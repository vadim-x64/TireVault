<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <h2 class="fw-bold mb-4">Мої відгуки</h2>
    <ul class="nav nav-tabs mb-4" id="reviewsTabs">
        <li class="nav-item">
            <button class="nav-link active text-dark" data-bs-toggle="tab" data-bs-target="#tab-reviews">
                Відгуки
                <span class="badge bg-secondary ms-1" th:text="${myReviews.size()}"></span>
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link text-dark" data-bs-toggle="tab" data-bs-target="#tab-notifications">
                Сповіщення
                <span class="badge bg-secondary ms-1" th:text="${notifications.size()}"></span>
            </button>
        </li>
    </ul>
    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-reviews">
            <div th:if="${myReviews.isEmpty()}" class="text-muted text-center py-5">
                <i class="bi bi-chat-square fs-1 d-block mb-2"></i>
                Ви ще не залишали відгуків
            </div>
            <div th:each="review : ${myReviews}" class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
                        <div>
                            <a th:href="${targetLinks.get(review.targetType + '_' + review.targetId) + '#reviews'}"
                               class="text-decoration-none text-dark fw-semibold small">
                                <i th:classappend="${review.targetType.name() == 'PRODUCT'}
                                                   ? 'bi-box-seam' : 'bi-wrench-adjustable'"
                                   class="bi me-1 text-danger"></i>
                                <span th:text="${targetNames.get(review.targetType + '_' + review.targetId)}
                                               ?: '—'"></span>
                            </a>
                            <span class="text-muted ms-3 small"
                                  th:text="${#temporals.format(review.createdAt,'dd.MM.yyyy HH:mm')}"></span>
                            <span th:if="${review.parent != null}"
                                  class="badge bg-secondary ms-2 small">відповідь</span>
                        </div>
                        <form th:action="@{/reviews/{id}/delete(id=${review.id})}"
                              method="post"
                              onsubmit="return confirm('Видалити відгук?')">
                            <input type="hidden" name="targetType" th:value="${review.targetType}">
                            <input type="hidden" name="targetId" th:value="${review.targetId}">
                            <input type="hidden" name="from" value="myreviews">   <!-- ← додати -->
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </form>
                    </div>
                    <p class="mb-1" th:text="${review.content}"></p>
                    <span class="text-muted small">
                        <i class="bi bi-heart-fill text-danger me-1"></i>
                        <span th:text="${review.likes.size()}"></span>
                        &nbsp;·&nbsp;
                        <i class="bi bi-chat me-1"></i>
                        <span th:text="${review.replies.size()} + ' відповідей'"></span>
                    </span>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="tab-notifications">
            <div th:if="${notifications.isEmpty()}" class="text-muted text-center py-5">
                <i class="bi bi-bell-slash fs-1 d-block mb-2"></i>
                Немає сповіщень
            </div>
            <div th:each="n : ${notifications}"
                 th:classappend="${!n.seen} ? 'border-warning' : ''"
                 class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-1 flex-wrap gap-2">
                        <span class="fw-semibold small">
                            <i th:classappend="${n.type == 'LIKE'} ? 'bi-heart-fill text-danger' : 'bi-reply-fill text-primary'"
                               class="bi me-1"></i>
                            <span th:text="${n.review.user.username}"></span>
                            <span th:text="${n.type == 'LIKE'} ? 'вподобав(ла) ваш коментар' : 'відповів(ла) на ваш коментар'"></span>
                        </span>
                        <span class="text-muted small" th:text="${#temporals.format(n.createdAt,'dd.MM.yyyy HH:mm')}">
                        </span>
                    </div>
                    <p class="mb-1 text-secondary small" th:text="${n.review.content}"></p>
                    <a th:href="${targetLinks.get(n.review.targetType + '_' + n.review.targetId)
                                  + '#review-' + n.review.id}"
                       class="btn btn-sm btn-outline-dark mt-1">
                        <i class="bi bi-arrow-right me-1"></i>Переглянути
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
