<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a href="/services" class="text-decoration-none text-danger">Послуги</a>
            </li>
            <li class="breadcrumb-item">
                <a th:href="@{/services/category/{id}(id=${workService.category.id})}"
                   th:text="${workService.category.name}"
                   class="text-decoration-none text-danger"></a>
            </li>
            <li class="breadcrumb-item active" th:text="${workService.name}"></li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header py-3 bg-dark">
                    <span class="badge bg-danger me-2" th:text="${workService.category.name}"></span>
                    <span class="fs-5 fw-bold text-white" th:text="${workService.name}"></span>
                </div>
                <div class="card-body p-4">
                    <div class="mb-4">
                        <span class="text-muted small">Вартість послуги</span>
                        <div class="fs-3 fw-bold" th:text="${workService.price} + ' ₴'"></div>
                    </div>
                    <div th:if="${workService.description != null}" class="mb-4">
                        <h6 class="fw-bold text-uppercase text-muted mb-2 small">
                            Опис
                        </h6>
                        <p class="text-secondary lh-lg"
                           th:text="${workService.description}"></p>
                    </div>
                    <div th:if="${workService.workingHours != null}" class="mb-4">
                        <h6 class="fw-bold text-uppercase text-muted mb-2 small">
                            Години роботи
                        </h6>
                        <p class="text-secondary" th:text="${workService.workingHours}"></p>
                    </div>
                    <hr>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <a href="/" class="btn btn-danger fw-bold px-4 py-2">
                            <i class="bi bi-calendar-check me-2"></i>Записатися на послугу
                        </a>
                        <a th:href="@{/services/category/{id}(id=${workService.category.id})}"
                           class="btn btn-outline-secondary px-4 py-2">
                            Інші послуги категорії
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
