<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<body>

<div class="container-fluid py-4" th:fragment="content">
    <div class="d-flex align-items-center mb-4">
        <h3 class="fw-bold mb-0">Журнал записів</h3>
    </div>
    <ul class="nav nav-tabs mb-4" id="managerOrdersTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active fw-bold text-dark" id="m-active-tab" data-bs-toggle="tab"
                    data-bs-target="#mActiveOrders" type="button" role="tab">
                Активні
                <span th:if="${#lists.size(activeOrders) > 0}"
                      class="badge bg-danger rounded-pill ms-1"
                      th:text="${#lists.size(activeOrders)}"></span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link fw-bold text-dark" id="m-completed-tab" data-bs-toggle="tab"
                    data-bs-target="#mCompletedOrders" type="button" role="tab">
                Завершені
                <span th:if="${#lists.size(completedOrders) > 0}"
                      class="badge bg-success rounded-pill ms-1"
                      th:text="${#lists.size(completedOrders)}"></span>
            </button>
        </li>
    </ul>
    <div class="tab-content" id="managerOrdersTabContent">
        <div class="tab-pane fade show active" id="mActiveOrders" role="tabpanel">
            <div th:if="${#lists.isEmpty(activeOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-inbox mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Нових записів немає</p>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(activeOrders)}">
                <div class="col-md-6 col-lg-4" th:each="order : ${activeOrders}">
                    <div class="card border-0 shadow-sm h-100 manager-order-card"
                         role="button"
                         th:attr="data-id=${order.id},
                                  data-name=${order.customerName},
                                  data-phone=${order.phone},
                                  data-city=${order.city},
                                  data-description=${order.description != null ? order.description : ''},
                                  data-status=${order.status.name()},
                                  data-created=${order.formattedDate},
                                  data-scheduled=${order.formattedScheduledDate},
                                  data-payment=${order.paymentMethod != null ? order.paymentMethod.name() : ''}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h6 class="fw-bold mb-0" th:text="${order.customerName}">Ім'я</h6>
                                <span th:if="${order.status.name() == 'PENDING'}"
                                      class="badge bg-danger d-flex align-items-center gap-1">
                                    <span class="rounded-circle bg-white d-inline-block p-1"></span>
                                    В очікуванні
                                </span>
                                <span th:if="${order.status.name() == 'ACCEPTED'}"
                                      class="badge bg-warning text-dark">Прийнято</span>
                                <span th:if="${order.status.name() == 'SCHEDULED'}"
                                      class="badge bg-info text-dark">
                                    <span th:text="${order.formattedScheduledDate}"></span>
                                </span>
                            </div>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-telephone me-1"></i>
                                <span th:text="${order.phone}"></span>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-geo-alt me-1"></i>
                                <span th:text="${order.city}"></span>
                            </p>
                            <p class="text-muted small mb-0 mt-2">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${order.formattedDate}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="mCompletedOrders" role="tabpanel">
            <div th:if="${#lists.isEmpty(completedOrders)}" class="text-center text-muted py-5">
                <i class="bi bi-check2-circle mb-3 d-block mx-auto opacity-50 fs-1"></i>
                <p class="fs-5">Завершених записів немає</p>
            </div>
            <div class="row g-3" th:if="${!#lists.isEmpty(completedOrders)}">
                <div class="col-md-6 col-lg-4" th:each="order : ${completedOrders}">
                    <div class="card border-0 shadow-sm h-100 manager-order-card position-relative"
                         role="button"
                         th:attr="data-id=${order.id},
                                  data-name=${order.customerName},
                                  data-phone=${order.phone},
                                  data-city=${order.city},
                                  data-description=${order.description != null ? order.description : ''},
                                  data-status=${order.status.name()},
                                  data-created=${order.formattedDate},
                                  data-scheduled=${order.formattedScheduledDate},
                                  data-payment=${order.paymentMethod != null ? order.paymentMethod.name() : ''}">
                        <form th:action="@{/manager/services/{id}/delete(id=${order.id})}"
                              method="post"
                              onsubmit="return confirm('Видалити замовлення?')"
                              onclick="event.stopPropagation()">
                            <button type="submit"
                                    class="btn btn-sm btn-close position-absolute bottom-0 end-0 m-2"
                                    title="Видалити">
                            </button>
                        </form>
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h6 class="fw-bold mb-0" th:text="${order.customerName}">Ім'я</h6>
                                <span th:if="${order.status.name() == 'COMPLETED'}"
                                      class="badge bg-success">Виконано</span>
                                <span th:if="${order.status.name() == 'CANCELLED'}"
                                      class="badge bg-secondary">Скасовано</span>
                            </div>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-telephone me-1"></i>
                                <span th:text="${order.phone}"></span>
                            </p>
                            <p class="text-muted small mb-1">
                                <i class="bi bi-geo-alt me-1"></i>
                                <span th:text="${order.city}"></span>
                            </p>
                            <p class="text-muted small mb-0 mt-2">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${order.formattedDate}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="managerOrderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark">
                    <h5 class="modal-title text-white fw-bold">Замовлення клієнта</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3 text-center">
                        <span id="mModalStatusBadge" class="badge fs-6 px-3 py-2">Статус</span>
                    </div>
                    <table class="table table-borderless">
                        <tbody>
                        <tr>
                            <td class="text-muted fw-bold pe-3 text-nowrap">Ім'я</td>
                            <td id="mModalName" class="fw-bold"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold pe-3 text-nowrap">Телефон</td>
                            <td id="mModalPhone"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold pe-3 text-nowrap">Місто</td>
                            <td id="mModalCity"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-bold pe-3 text-nowrap">Дата запису</td>
                            <td id="mModalCreated"></td>
                        </tr>
                        <tr id="mModalDescRow">
                            <td class="text-muted fw-bold pe-3 text-nowrap">Опис</td>
                            <td id="mModalDescription"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div id="mAcceptSection" class="modal-footer border-top d-none">
                    <form id="mAcceptForm" method="post">
                        <div class="form-check d-flex align-items-center gap-2 mb-0">
                            <input class="form-check-input" type="checkbox" id="mAcceptCheck"
                                   onchange="document.getElementById('mAcceptForm').submit()">
                            <label class="form-check-label fw-bold fs-6" for="mAcceptCheck">
                                Прийняти замовлення
                            </label>
                        </div>
                    </form>
                </div>
                <div id="mScheduleSection" class="modal-footer flex-column align-items-start border-top d-none gap-2">
                    <form id="mScheduleForm" method="post" class="w-100">
                        <input type="hidden" id="mScheduledAt" name="scheduledAt">
                        <label class="fw-bold mb-1">Призначити дату прийому:</label>
                        <input type="date" id="mScheduleDate" class="form-control mb-2 w-auto">
                        <div id="mSlotsContainer" class="mb-2">
                            <p class="text-muted small mb-0">Оберіть дату</p>
                        </div>
                        <button type="submit" class="btn btn-danger btn-sm fw-bold"
                                onclick="if(!document.getElementById('mScheduledAt').value){alert('Оберіть час');return false;}">
                            Забронювати
                        </button>
                    </form>
                    <hr class="w-100 my-1">
                    <form id="mCancelFromAcceptedForm" method="post" class="w-100"
                          onsubmit="return confirm('Скасувати замовлення?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Скасувати запис</button>
                    </form>
                </div>
                <div id="mCompleteSection" class="modal-footer flex-column align-items-start border-top d-none gap-2">
                    <form id="mCompleteForm" method="post" class="w-100">
                        <label class="fw-bold mb-1">Спосіб оплати:</label>
                        <div class="d-flex gap-3 mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="paymentMethod"
                                       id="payCard" value="CARD" required>
                                <label class="form-check-label" for="payCard">Карта</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="paymentMethod"
                                       id="payCash" value="CASH">
                                <label class="form-check-label" for="payCash">Готівка</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success btn-sm fw-bold px-3">
                            Виконано
                        </button>
                    </form>
                    <hr class="w-100 my-1">
                    <form id="mUnscheduleForm" method="post" class="w-100">
                        <button type="submit" class="btn btn-outline-dark btn-sm">
                            Скасувати бронювання
                        </button>
                    </form>
                    <form id="mCancelFromScheduledForm" method="post" class="w-100"
                          onsubmit="return confirm('Скасувати замовлення?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Скасувати запис</button>
                    </form>
                </div>
                <div id="mDoneSection" class="modal-footer flex-column align-items-start d-none">
                    <p class="mb-2 fw-bold">
                        Оплата: <span id="mDonePayment" class="text-success"></span>
                    </p>
                </div>
                <div id="mCancelledSection" class="modal-footer d-none"></div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/pages/manager/services.js}"></script>
</div>

</body>
</html>
