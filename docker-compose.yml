services:
  db:
    image: postgres:15
    container_name: tirevault-db
    environment:
      POSTGRES_DB: TireVault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: tirevault-app
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/TireVault
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "1111"
    depends_on:
      db:
        condition: service_healthy
    restart: no

volumes:
  pgdata: